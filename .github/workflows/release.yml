name: Release

on:
  push:
    tags:
      - 'v*'

# 创建 Release 需要写权限
permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: contextsend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: contextsend

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile
        working-directory: contextsend

      - name: 构建并发布到 GitHub Release（未签名）
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: contextsend
          tagName: ${{ github.ref_name }}
          releaseName: 'ContextSend ${{ github.ref_name }}'
          releaseBody: '本版本由 CI 自动构建（未签名）。三平台安装包见下方附件。'
          releaseDraft: true
          prerelease: false
